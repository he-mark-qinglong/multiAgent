apiVersion: apps/v1
kind: Deployment
metadata:
  name: multiagent
  namespace: multiagent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: multiagent
  template:
    metadata:
      labels:
        app: multiagent
    spec:
      containers:
        - name: multiagent
          image: multiagent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: multiagent-secrets
                  key: deepseek-api-key
            - name: LANGSMITH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: multiagent-secrets
                  key: langsmith-api-key
            - name: LANGSMITH_PROJECT
              valueFrom:
                configMapKeyRef:
                  name: multiagent-config
                  key: LANGSMITH_PROJECT
            - name: POSTGRES_HOST
              value: "postgres.multiagent.svc.cluster.local"
            - name: POSTGRES_DB
              value: "multiagent"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: multiagent-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: multiagent-secrets
                  key: postgres-password
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            exec:
              command: ["python", "-c", "import core; print('OK')"]
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["python", "-c", "import core; print('OK')"]
            initialDelaySeconds: 5
            periodSeconds: 10
