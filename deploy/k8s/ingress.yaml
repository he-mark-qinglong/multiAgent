apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multiagent
  namespace: multiagent
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: multiagent.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multiagent
                port:
                  number: 80
